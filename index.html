<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saidoğlu Baklavaları</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#faf7f0;
}

header{
height:500px;
background:url("hero.jpg") center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

header h1{
background:rgba(0,0,0,.45);
padding:20px 40px;
color:#fff;
font-size:52px;
border-radius:12px;
}

section{
max-width:1100px;
margin:auto;
padding:40px;
}

h2{
color:#8a5b00;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
width:100%;
border-radius:8px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:25px;
}
</style>

</head>
<body>

<header>
<h1>SAİDOĞLU BAKLAVALARI</h1>
</header>

<section>

<h2>Ustalığın Lezzetle Buluştuğu Nokta</h2>

<p>
Günlük taze üretim, bol Antep fıstığı ve gerçek tereyağıyla hazırlanan özel baklavalarımız sizleri bekliyor.
</p>

<div class="grid">

<div class="card">
<img src="baklava1.jpg">
<h3>Fıstıklı Baklava</h3>
</div>

<div class="card">
<img src="baklava2.jpg">
<h3>Özel Kare Baklava</h3>
</div>

<div class="card">
<img src="baklava3.jpg">
<h3>Sarma</h3>
</div>

</div>

</section>

<footer>

© 2026 Saidoğlu Baklavaları

</footer>

</body>
</html>
